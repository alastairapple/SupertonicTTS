name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build App
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -project SupertonicTTS.xcodeproj \
            -scheme "SupertonicTTS" \
            -resolvePackageDependencies

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project SupertonicTTS.xcodeproj \
            -scheme "SupertonicTTS" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            clean build \
            | tee /tmp/xcodebuild.log

      - name: Smoke test in iOS Simulator
        run: |
          set -euo pipefail

          RUNTIME_ID=$(xcrun simctl list runtimes iOS --json | ruby -rjson -e 'data=JSON.parse(STDIN.read); runtime=data.fetch("runtimes").find { |r| r["isAvailable"] }; abort("No available iOS runtime") unless runtime; puts runtime.fetch("identifier")')
          DEVICE_TYPE="com.apple.CoreSimulator.SimDeviceType.iPhone-16"
          DEVICE_NAME="SupertonicTTS-CI"

          xcrun simctl delete "$DEVICE_NAME" >/dev/null 2>&1 || true
          UDID=$(xcrun simctl create "$DEVICE_NAME" "$DEVICE_TYPE" "$RUNTIME_ID")
          trap 'xcrun simctl delete "$UDID" >/dev/null 2>&1 || true' EXIT

          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b

          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path "*/Build/Products/Debug-iphonesimulator/SupertonicTTS.app" | head -1)
          test -n "$APP_PATH"

          APP_BUNDLE_ID="com.app.SupertonicTTS"
          xcrun simctl install "$UDID" "$APP_PATH"
          xcrun simctl launch "$UDID" "$APP_BUNDLE_ID"

          CONTAINER_PATH=$(xcrun simctl get_app_container "$UDID" "$APP_BUNDLE_ID" app)
          test -f "$CONTAINER_PATH/tts.json"
          test -f "$CONTAINER_PATH/unicode_indexer.json"
          test -f "$CONTAINER_PATH/onnx/duration_predictor.onnx"
          test -f "$CONTAINER_PATH/onnx/text_encoder.onnx"
          test -f "$CONTAINER_PATH/onnx/text_encoder.onnx.1"
          test -f "$CONTAINER_PATH/onnx/vector_estimator.onnx"
          test -f "$CONTAINER_PATH/onnx/vocoder.onnx"
          test -f "$CONTAINER_PATH/voice_styles/M1.json"
          test -f "$CONTAINER_PATH/voice_styles/M5.json"
          test -f "$CONTAINER_PATH/voice_styles/F1.json"
          test -f "$CONTAINER_PATH/voice_styles/F5.json"

      - name: Archive unsigned app
        run: |
          set -o pipefail
          xcodebuild archive \
            -project SupertonicTTS.xcodeproj \
            -scheme "SupertonicTTS" \
            -destination "generic/platform=iOS" \
            -archivePath /tmp/SupertonicTTS.xcarchive \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | tee /tmp/xcodebuild-archive.log

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find /tmp/SupertonicTTS.xcarchive/Products -name "*.app" | head -1)
          mkdir -p /tmp/ipa/Payload
          cp -R "$APP_PATH" /tmp/ipa/Payload/
          cd /tmp/ipa
          zip -r /tmp/SupertonicTTS-unsigned.ipa Payload

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: /tmp/xcodebuild*.log
          retention-days: 7

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: SupertonicTTS-unsigned-ipa
          path: /tmp/SupertonicTTS-unsigned.ipa
          retention-days: 14

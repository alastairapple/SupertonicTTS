name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build App
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -project SupertonicTTS.xcodeproj \
            -scheme "SupertonicTTS" \
            -resolvePackageDependencies

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project SupertonicTTS.xcodeproj \
            -scheme "SupertonicTTS" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            clean build \
            | tee /tmp/xcodebuild.log

      - name: Smoke test in iOS Simulator
        run: |
          set -euo pipefail

          RUNTIME_ID=$(xcrun simctl list runtimes iOS --json | ruby -rjson -e 'data=JSON.parse(STDIN.read); runtime=data.fetch("runtimes").find { |r| r["isAvailable"] }; abort("No available iOS runtime") unless runtime; puts runtime.fetch("identifier")')
          DEVICE_TYPE="com.apple.CoreSimulator.SimDeviceType.iPhone-16"
          DEVICE_NAME="SupertonicTTS-CI"

          xcrun simctl delete "$DEVICE_NAME" >/dev/null 2>&1 || true
          UDID=$(xcrun simctl create "$DEVICE_NAME" "$DEVICE_TYPE" "$RUNTIME_ID")
          trap 'xcrun simctl delete "$UDID" >/dev/null 2>&1 || true' EXIT

          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b

          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path "*/Build/Products/Debug-iphonesimulator/SupertonicTTS.app" | head -1)
          test -n "$APP_PATH"

          APP_BUNDLE_ID="com.app.SupertonicTTS"
          xcrun simctl install "$UDID" "$APP_PATH"
          xcrun simctl launch "$UDID" "$APP_BUNDLE_ID"

          CONTAINER_PATH=$(xcrun simctl get_app_container "$UDID" "$APP_BUNDLE_ID" app)

          assert_bundle_file() {
            local relative_path="$1"
            if [ -f "$CONTAINER_PATH/$relative_path" ] || [ -f "$CONTAINER_PATH/Resources/$relative_path" ]; then
              return 0
            fi
            echo "Missing bundle file: $relative_path"
            find "$CONTAINER_PATH" -maxdepth 3 -type f | sort
            return 1
          }

          assert_bundle_file "tts.json"
          assert_bundle_file "unicode_indexer.json"
          assert_bundle_file "onnx/duration_predictor.onnx"
          assert_bundle_file "onnx/text_encoder.onnx"
          assert_bundle_file "onnx/text_encoder.onnx.1"
          assert_bundle_file "onnx/vector_estimator.onnx"
          assert_bundle_file "onnx/vocoder.onnx"
          assert_bundle_file "voice_styles/M1.json"
          assert_bundle_file "voice_styles/M5.json"
          assert_bundle_file "voice_styles/F1.json"
          assert_bundle_file "voice_styles/F5.json"

      - name: Archive unsigned app
        run: |
          set -o pipefail
          xcodebuild archive \
            -project SupertonicTTS.xcodeproj \
            -scheme "SupertonicTTS" \
            -destination "generic/platform=iOS" \
            -archivePath /tmp/SupertonicTTS.xcarchive \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | tee /tmp/xcodebuild-archive.log

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find /tmp/SupertonicTTS.xcarchive/Products -name "*.app" | head -1)
          mkdir -p /tmp/ipa/Payload
          cp -R "$APP_PATH" /tmp/ipa/Payload/
          cd /tmp/ipa
          zip -r /tmp/SupertonicTTS-unsigned.ipa Payload

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: /tmp/xcodebuild*.log
          retention-days: 7

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: SupertonicTTS-unsigned-ipa
          path: /tmp/SupertonicTTS-unsigned.ipa
          retention-days: 14

      - name: Publish IPA to rolling release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          RELEASE_API="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases"
          RELEASE_TAG="latest-build"
          RELEASE_NAME="Latest Build"

          EXISTING=$(curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "${RELEASE_API}/tags/${RELEASE_TAG}")
          RELEASE_ID=$(printf '%s' "$EXISTING" | ruby -rjson -e 'data=JSON.parse(STDIN.read) rescue {}; puts(data["id"] || "")')

          if [ -z "$RELEASE_ID" ]; then
            RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "$RELEASE_API" \
              -d "{\"tag_name\":\"${RELEASE_TAG}\",\"name\":\"${RELEASE_NAME}\",\"target_commitish\":\"${GITHUB_SHA}\",\"prerelease\":true,\"generate_release_notes\":false}")
            RELEASE_ID=$(printf '%s' "$RESPONSE" | ruby -rjson -e 'data=JSON.parse(STDIN.read); puts data.fetch("id")')
          else
            curl -s -X PATCH \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${RELEASE_API}/${RELEASE_ID}" \
              -d "{\"name\":\"${RELEASE_NAME}\",\"target_commitish\":\"${GITHUB_SHA}\",\"prerelease\":true}" >/dev/null
          fi

          ASSETS=$(curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "${RELEASE_API}/${RELEASE_ID}/assets")
          EXISTING_ASSET_ID=$(printf '%s' "$ASSETS" | ruby -rjson -e 'assets=JSON.parse(STDIN.read); asset=assets.find { |a| a["name"] == "SupertonicTTS-unsigned.ipa" }; puts(asset && asset["id"] || "")')

          if [ -n "$EXISTING_ASSET_ID" ]; then
            curl -s -X DELETE \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${EXISTING_ASSET_ID}" >/dev/null
          fi

          curl -s -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=SupertonicTTS-unsigned.ipa" \
            --data-binary @/tmp/SupertonicTTS-unsigned.ipa >/dev/null
